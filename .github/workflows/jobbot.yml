name: Daily Job Scraper

permissions:
  contents: read
  actions: read

on:
  schedule:
    # Runs at 7 AM IST (UTC+5:30) every day — cron uses UTC
    - cron: '30 1 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Restore jobs.db from last successful run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json, os, subprocess, urllib.request, urllib.error, zipfile, sys, traceback
          try:
              repo = os.environ['GITHUB_REPOSITORY']
              branch = os.environ.get('GITHUB_REF_NAME') or 'main'
              token = os.environ['GITHUB_TOKEN']
              headers = {
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'jobbot-action'
              }
              def fetch_json(url):
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return json.loads(resp.read().decode())
              workflow_file = 'jobbot.yml'
              runs_url = f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?branch={branch}&status=success&per_page=5'
              runs = fetch_json(runs_url).get('workflow_runs', [])
              if not runs:
                  print('No previous successful workflow runs found; continuing without restore.')
                  sys.exit(0)
              run_id = runs[0].get('id')
              if not run_id:
                  print('No valid run id found; continuing without restore.')
                  sys.exit(0)
              artifacts_url = f'https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts'
              artifacts = fetch_json(artifacts_url).get('artifacts', [])
              artifact_id = None
              for artifact in artifacts:
                  if artifact.get('name') == 'jobbot-db':
                      artifact_id = artifact.get('id')
                      break
              if not artifact_id:
                  print('No previous jobbot-db artifact found; continuing without restore.')
                  sys.exit(0)
              download_url = f'https://api.github.com/repos/{repo}/actions/artifacts/{artifact_id}/zip'
              curl_cmd = [
                  'curl', '-fSL', '--location-trusted',
                  '-H', f'Authorization: Bearer {token}',
                  '-H', 'Accept: application/octet-stream',
                  download_url,
                  '-o', 'jobbot-db.zip'
              ]
              subprocess.run(curl_cmd, check=True)
              with open('jobbot-db.zip', 'rb') as fh:
                  signature = fh.read(4)
              if signature != b'PK\x03\x04':
                  with open('jobbot-db.zip', 'rb') as fh:
                      content = fh.read(1024)
                  print('Downloaded artifact is not a zip file. First bytes:')
                  print(content[:1024].decode('utf-8', errors='replace'))
                  print('Continuing without restore.')
                  sys.exit(0)
              with zipfile.ZipFile('jobbot-db.zip') as zf:
                  zf.extractall('.')
              print('Restored previous jobs.db from jobbot-db artifact.')
          except Exception:
              print('Warning: artifact restore failed; continuing without restore.')
              traceback.print_exc()
              sys.exit(0)
          PY
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID=${{ secrets.CHAT_ID }}
          DATABASE_URL=jobs.db
          RSS_URLS=${{ secrets.RSS_URLS }}
          INSTAGRAM_ACCOUNTS=${{ secrets.INSTAGRAM_ACCOUNTS }}
          JOB_KEYWORDS=${{ secrets.JOB_KEYWORDS }}
          SCHEDULE_CRON=30 1 * * *
          LOG_LEVEL=INFO
          TELEGRAM_PARSE_MODE=Markdown
          COMPANY_CAREER_PAGES=${{ secrets.COMPANY_CAREER_PAGES }}
          EOF
      
      - name: Run job scraper
        run: python main.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobbot-logs
          path: jobbot.log
          retention-days: 7
      
      - name: Upload jobs.db state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobbot-db
          path: jobs.db
          if-no-files-found: ignore
          retention-days: 30
